# Local environment for ORBIT.
#
# Default `docker compose up` starts only Postgres, so you can run the apps
# locally with `pnpm dev` (fast feedback). Use the `full` profile to also
# build and run the core + web containers:
#   docker compose --profile full up --build
#
# Values come from `.env` (copy from .env.example). Nothing is hardcoded.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orbit}
      POSTGRES_DB: ${POSTGRES_DB:-orbit}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - orbit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orbit}"]
      interval: 5s
      timeout: 5s
      retries: 5

  core:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/core/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD:-orbit}@postgres:5432/${POSTGRES_DB:-orbit}
      ORBIT_ENCRYPTION_KEY: ${ORBIT_ENCRYPTION_KEY}
      # ORBIT-internal auth: the core issues its own JWTs and seeds a bootstrap admin.
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      ORBIT_ADMIN_EMAIL: ${ORBIT_ADMIN_EMAIL:-admin@orbit.local}
      ORBIT_ADMIN_PASSWORD: ${ORBIT_ADMIN_PASSWORD:-change-me-in-local}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      # Server-side call inside the compose network reaches the core service.
      CORE_API_URL: http://core:3001/api
      # Auth.js session cookie signing + base URL.
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      - core

volumes:
  orbit_pgdata:
