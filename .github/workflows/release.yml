# Builds Orbit Desktop on Linux, macOS and Windows and publishes a (draft)
# GitHub Release with the installers. Triggered by pushing a tag like `v0.1.0`.
#
# Each runner builds the self-contained sidecar binary for its own OS/arch
# (Node SEA, via apps/desktop/scripts/build-sidecar-bin.mjs) — invoked by Tauri's
# beforeBuildCommand — then bundles it next to the app (externalBin).
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04 # Linux: .deb + AppImage
          - platform: macos-latest # macOS (Apple Silicon): .dmg
          - platform: windows-latest # Windows: .msi
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            build-essential libxdo-dev libssl-dev

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & publish the desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Orbit Desktop ${{ github.ref_name }}"
          releaseBody: "Local-first Orbit Desktop. Download the installer for your platform below."
          releaseDraft: true
          prerelease: false
